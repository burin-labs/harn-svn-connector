name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  harn:
    name: Harn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .harn-version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install harn-cli
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.harn-version.outputs.version }}"
          harn_root="${HOME}/.harn-cli/${version}"
          if [[ ! -x "${harn_root}/bin/harn" ]]; then
            mkdir -p "${harn_root}/bin"
            curl -fsSL \
              -o "${RUNNER_TEMP}/harn.tar.gz" \
              "https://github.com/burin-labs/harn/releases/download/v${version}/harn-x86_64-unknown-linux-gnu.tar.gz"
            tar -xzf "${RUNNER_TEMP}/harn.tar.gz" -C "${harn_root}/bin"
          fi
          echo "${harn_root}/bin" >> "${GITHUB_PATH}"

      - name: Show Harn version
        run: harn --version

      - name: Install Harn dependencies
        run: harn install

      - name: Check
        run: harn check src

      - name: Lint
        run: harn lint src

      - name: Format
        run: harn fmt --check src tests

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          for test in tests/*.harn; do
            harn run "${test}"
          done

      - name: Connector contract
        run: harn connector check .

      - name: Package install smoke
        shell: bash
        run: |
          set -euo pipefail
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          cat > "$smoke_root/harn.toml" <<'EOF'
          [package]
          name = "harn-svn-connector-consumer-smoke"
          version = "0.0.0"
          EOF
          cd "$smoke_root"
          harn add "$GITHUB_WORKSPACE@HEAD"
          printf 'import "harn-svn-connector/default"\n' > smoke.harn
          harn check smoke.harn

  package:
    name: package
    if: always()
    needs: harn
    runs-on: ubuntu-latest
    steps:
      - name: Check Harn job result
        run: |
          if [ "${{ needs.harn.result }}" != "success" ]; then
            echo "Harn job finished with ${{ needs.harn.result }}"
            exit 1
          fi
          echo "Harn job passed"
